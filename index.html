<script>
// Typing effect
let message = "Don't read this if you're still angry...\n\nI never meant to hurt you... I just want us back ❤️";
let i = 0;

function typeWriter() {
  if (i < message.length) {
    document.getElementById("text").innerHTML += message.charAt(i);
    i++;
    setTimeout(typeWriter, 35);
  }
}

// Start typing after slight delay
setTimeout(typeWriter, 1000);

// ❤️ Floating hearts (SMOOTHER + RANDOM)
function createHeart() {
  const heart = document.createElement("div");
  heart.classList.add("heart");
  heart.innerHTML = ["❤️","💖","💕","💘"][Math.floor(Math.random()*4)];

  heart.style.left = Math.random() * 100 + "vw";
  heart.style.fontSize = (Math.random() * 25 + 15) + "px";
  heart.style.animationDuration = (Math.random() * 3 + 3) + "s";

  document.body.appendChild(heart);

  setTimeout(() => {
    heart.remove();
  }, 6000);
}

// More hearts at start (burst effect)
for (let i = 0; i < 20; i++) {
  setTimeout(createHeart, i * 150);
}

// Continuous hearts
setInterval(createHeart, 300);

// 💫 Box entrance animation
const box = document.querySelector(".box");
box.style.transform = "scale(0.8)";
box.style.opacity = "0";

setTimeout(() => {
  box.style.transition = "all 1s ease";
  box.style.transform = "scale(1)";
  box.style.opacity = "1";
}, 200);

</script>
