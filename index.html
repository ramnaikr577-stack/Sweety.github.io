<!DOCTYPE html>
<html>
<head>
<title>For You ❤️</title>

<style>
body {
  margin: 0;
  overflow: hidden;
  background: linear-gradient(135deg, #ff4d6d, #ff99ac);
  font-family: cursive;
}

/* Center text */
.center {
  position: absolute;
  top: 50%;
  left: 50%;
  transform: translate(-50%, -50%);
  color: white;
  font-size: 30px;
  text-align: center;
  opacity: 0;
  transition: 1s;
}

/* Hearts */
.heart {
  position: absolute;
  font-size: 20px;
  cursor: pointer;
  animation: floatUp linear forwards;
}

@keyframes floatUp {
  0% { transform: translateY(0); opacity: 1; }
  100% { transform: translateY(-120vh); opacity: 0; }
}

/* Explosion text */
.loveText {
  position: absolute;
  color: white;
  font-size: 24px;
  font-weight: bold;
  animation: pop 1s ease forwards;
}

@keyframes pop {
  0% { transform: scale(0); opacity: 0; }
  50% { transform: scale(1.5); opacity: 1; }
  100% { transform: scale(1); opacity: 0; }
}
</style>

</head>

<body>

<div class="center" id="mainText">For You ❤️</div>

<script>

// 💥 Explosion on load
function burstHearts() {
  for (let i = 0; i < 30; i++) {
    createHeart(true);
  }
}

// ❤️ Create floating hearts
function createHeart(isBurst = false) {
  const heart = document.createElement("div");
  heart.classList.add("heart");
  heart.innerHTML = ["❤️","💖","💕","💘"][Math.floor(Math.random()*4)];

  heart.style.left = Math.random() * 100 + "vw";
  heart.style.top = isBurst ? "50%" : "100%";
  heart.style.fontSize = (Math.random()*25 + 15) + "px";
  heart.style.animationDuration = (Math.random()*4 + 3) + "s";

  document.body.appendChild(heart);

  // 👆 Tap → explode + show text
  heart.onclick = () => {
    showLove(heart);
    heart.remove();
  };

  setTimeout(() => heart.remove(), 7000);
}

// 💖 Show "I Love You"
function showLove(heart) {
  const text = document.createElement("div");
  text.classList.add("loveText");
  text.innerText = "I Love You ❤️";

  text.style.left = heart.style.left;
  text.style.top = heart.style.top;

  document.body.appendChild(text);

  setTimeout(() => text.remove(), 1000);
}

// 🔁 Continuous hearts
setInterval(() => {
  for (let i = 0; i < 8; i++) {
    createHeart();
  }
}, 5000);

// Start
burstHearts();

// Show center text after delay
setTimeout(() => {
  document.getElementById("mainText").style.opacity = "1";
}, 1500);

</script>

</body>
</html>
