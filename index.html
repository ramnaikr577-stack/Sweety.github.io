<!DOCTYPE html>
<html>
<head>
<title>For You ❤️</title>

<style>
body {
  margin: 0;
  padding: 0;
  background: linear-gradient(to right, #ff758c, #ff7eb3);
  font-family: 'Segoe Script', cursive;
  overflow: hidden;
}

/* Center box */
.container {
  display: flex;
  justify-content: center;
  align-items: center;
  height: 100vh;
}

.box {
  background: rgba(255,255,255,0.9);
  padding: 40px;
  border-radius: 20px;
  width: 80%;
  max-width: 500px;
  text-align: center;
  animation: fadeIn 2s;
}

h1 {
  color: #ff4d6d;
}

#text {
  font-size: 18px;
  margin-top: 20px;
}

/* Fade animation */
@keyframes fadeIn {
  from {opacity: 0;}
  to {opacity: 1;}
}

/* Floating hearts */
.heart {
  position: absolute;
  color: red;
  font-size: 20px;
  animation: float 5s linear infinite;
}

@keyframes float {
  0% {
    transform: translateY(100vh);
    opacity: 1;
  }
  100% {
    transform: translateY(-10vh);
    opacity: 0;
  }
}
</style>
</head>

<body>

<div class="container">
  <div class="box">
    <h1>For Someone Special ❤️</h1>
    <p id="text"></p>
  </div>
</div>

<!-- Background Music -->
<audio autoplay loop>
  <source src="https://www.bensound.com/bensound-music/bensound-love.mp3" type="audio/mp3">
</audio>

<script>
// Typing effect
let message = "Your love letter text here...";
let i = 0;

function typeWriter() {
  if (i < message.length) {
    document.getElementById("text").innerHTML += message.charAt(i);
    i++;
    setTimeout(typeWriter, 40);
  }
}
typeWriter();

// Floating hearts generator
function createHeart() {
  const heart = document.createElement("div");
  heart.classList.add("heart");
  heart.innerHTML = "❤️";
  heart.style.left = Math.random() * 100 + "vw";
  heart.style.fontSize = (Math.random() * 20 + 10) + "px";
  document.body.appendChild(heart);

  setTimeout(() => {
    heart.remove();
  }, 5000);
}

setInterval(createHeart, 300);
</script>

</body>
  </html>
