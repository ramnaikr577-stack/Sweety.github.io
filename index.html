<!DOCTYPE html>
<html>
<head>
<title>For You ❤️</title>

<link href="https://fonts.googleapis.com/css2?family=Dancing+Script&display=swap" rel="stylesheet">

<style>
body {
  margin: 0;
  overflow: hidden;
  font-family: 'Dancing Script', cursive;
}

/* Envelope screen */
#envelopeScreen {
  height: 100vh;
  display: flex;
  justify-content: center;
  align-items: center;
  background: linear-gradient(135deg, #ff4d6d, #ff99ac);
}

.envelope {
  width: 320px;
  height: 220px;
  background: #ff6b81;
  border-radius: 12px;
  position: relative;
  text-align: center;
}

.flap {
  position: absolute;
  top: 0;
  width: 100%;
  height: 110px;
  background: #ff4757;
  clip-path: polygon(0 0, 50% 100%, 100% 0);
  transition: 1s;
}

input {
  position: absolute;
  bottom: 15px;
  left: 50%;
  transform: translateX(-50%);
  padding: 6px;
  border: none;
  border-radius: 5px;
  text-align: center;
}

/* Zip */
.zip {
  position: absolute;
  top: 40%;
  left: 50%;
  transform: translateX(-50%);
  font-size: 30px;
  display: none;
  cursor: grab;
}

/* Main scene */
#mainScene {
  display: none;
  height: 100vh;
  background: radial-gradient(circle, #ff758c, #ff2e63);
}

/* Letter box */
.letterBox {
  position: absolute;
  top: -100%;
  left: 50%;
  transform: translateX(-50%);
  width: 85%;
  max-width: 400px;
  height: 70%;
  background: white;
  border-radius: 15px;
  padding: 20px;
  overflow-y: auto;
  font-size: 18px;
  color: #333;
  transition: 1.5s ease;
}

/* Show letter */
.showLetter {
  top: 15%;
}

/* Hearts */
.heart {
  position: absolute;
  cursor: pointer;
  animation: floatUp linear forwards;
}

@keyframes floatUp {
  0% { transform: translateY(0); opacity: 1; }
  100% { transform: translateY(-120vh); opacity: 1; }
}

.loveText {
  position: absolute;
  color: white;
  font-size: 24px;
  font-weight: bold;
  animation: pop 1s forwards;
}

@keyframes pop {
  0% { transform: scale(0); opacity: 0; }
  50% { transform: scale(1.8); opacity: 1; }
  100% { transform: scale(1); opacity: 0; }
}
</style>
</head>

<body>

<!-- Envelope -->
<div id="envelopeScreen">
  <div class="envelope">
    <div class="flap" id="flap"></div>
    <div class="zip" id="zip">🔓</div>
    <input type="text" id="nameInput" placeholder="Type 'dear'..." />
  </div>
</div>

<!-- Main -->
<div id="mainScene">

  <!-- 💌 LETTER -->
  <div class="letterBox" id="letterBox">
    <p id="text"></p>
  </div>

</div>

<script>

// 💌 LETTER TEXT
let message = `My Love,

I know we had a misunderstanding, and ever since then my heart has felt heavy. I don't like the distance between us, even if it's just silence. You mean too much to me to let ego or small arguments create walls between us.

I'm not writing this to prove I'm right. I'm writing this because you are important to me. Your smile, your voice, the way you understand things, and even the way you get angry — everything about you matters to me. You are someone I deeply care about, respect, and value.

If I hurt you in any way, I am truly sorry. It was never my intention to make you feel sad. Sometimes words come out wrong, but my feelings for you have always been genuine and pure. I admire your strength, your kindness, and the beautiful heart you carry.

Every relationship has small storms, but I believe what we share is stronger than any misunderstanding. I don't want us to win arguments; I want us to understand each other better.

No matter what, please remember this — you are special to me. Not because you are perfect, but because you are you.

Let's talk, clear everything, and smile again. Because your happiness truly matters to me.

With all my heart,
Yours ❤️`;

// Typing effect
function typeLetter() {
  let i = 0;
  function typing() {
    if (i < message.length) {
      document.getElementById("text").innerHTML += message.charAt(i);
      i++;
      setTimeout(typing, 20);
    }
  }
  typing();
}

// Show zip only if "dear"
document.getElementById("nameInput").addEventListener("input", function() {
  if (this.value.toLowerCase() === "dear") {
    document.getElementById("zip").style.display = "block";
  }
});

// Drag zip
let zip = document.getElementById("zip");
let isDragging = false;

zip.addEventListener("mousedown", () => isDragging = true);
document.addEventListener("mouseup", () => isDragging = false);

document.addEventListener("mousemove", (e) => {
  if (isDragging) {
    zip.style.top = e.clientY + "px";

    if (e.clientY > window.innerHeight / 2 + 100) {
      openEnvelope();
    }
  }
});

// Mobile
zip.addEventListener("touchstart", () => isDragging = true);
document.addEventListener("touchend", () => isDragging = false);

document.addEventListener("touchmove", (e) => {
  if (isDragging) {
    let y = e.touches[0].clientY;
    zip.style.top = y + "px";

    if (y > window.innerHeight / 2 + 100) {
      openEnvelope();
    }
  }
});

// Open
function openEnvelope() {
  document.getElementById("flap").style.transform = "rotateX(180deg)";

  setTimeout(() => {
    document.getElementById("envelopeScreen").style.display = "none";
    document.getElementById("mainScene").style.display = "block";

    // 💌 show letter
    setTimeout(() => {
      document.getElementById("letterBox").classList.add("showLetter");
      typeLetter();
    }, 500);

  }, 800);
}

</script>

</body>
</html>
