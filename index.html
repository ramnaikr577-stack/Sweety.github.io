<!DOCTYPE html>
<html>

<head>
<title>Ram AI</title>

<style>
body{
font-family: Arial;
background:#111;
color:white;
text-align:center;
}

#chatbox{
width:300px;
height:300px;
border:1px solid white;
margin:auto;
overflow:auto;
padding:10px;
}

input{
width:200px;
padding:8px;
}

button{
padding:8px;
}
</style>

</head>

<body>

<h1>Ram AI 🤖</h1>

<div id="chatbox"></div>

<br>

<input id="userInput" placeholder="Type something...">
<button onclick="talk()">Send</button>

<script>

function talk(){

let input=document.getElementById("userInput").value;

let chatbox=document.getElementById("chatbox");

chatbox.innerHTML += "<p><b>You:</b> "+input+"</p>";

let reply="I don't understand";

if(input.toLowerCase()=="hello"){
reply="Hello Ram 👋";
}

if(input.toLowerCase()=="who are you"){
reply="I am your AI assistant.";
}

chatbox.innerHTML += "<p><b>AI:</b> "+reply+"</p>";

}

</script>

</body>

  </html>
