<!DOCTYPE html>
<html>
<head>
<title>For You ❤️</title>

<link href="https://fonts.googleapis.com/css2?family=Dancing+Script&display=swap" rel="stylesheet">

<style>
body {
  margin: 0;
  font-family: 'Dancing Script', cursive;
  overflow: hidden;
}

/* Envelope */
#envelopeScreen {
  height: 100vh;
  display: flex;
  justify-content: center;
  align-items: center;
  background: linear-gradient(135deg, #ff4d6d, #ff99ac);
}

.envelope {
  width: 320px;
  height: 220px;
  background: #ff6b81;
  border-radius: 12px;
  position: relative;
}

.flap {
  position: absolute;
  top: 0;
  width: 100%;
  height: 110px;
  background: #ff4757;
  clip-path: polygon(0 0, 50% 100%, 100% 0);
  transition: 1s;
}

input {
  position: absolute;
  bottom: 15px;
  left: 50%;
  transform: translateX(-50%);
  padding: 6px;
  border: none;
  border-radius: 5px;
  text-align: center;
}

.zip {
  position: absolute;
  top: 40%;
  left: 50%;
  transform: translateX(-50%);
  font-size: 30px;
  display: none;
  cursor: pointer;
}

/* Main */
#mainScene {
  display: none;
  height: 100vh;
  background: radial-gradient(circle, #ff758c, #ff2e63);
}

/* Letter */
.letterBox {
  position: absolute;
  top: -100%;
  left: 50%;
  transform: translateX(-50%);
  width: 85%;
  max-width: 400px;
  height: 70%;
  background: white;
  border-radius: 15px;
  padding: 20px;
  overflow-y: auto;
  font-size: 18px;
  color: #333;
  transition: 1.5s;
}

.showLetter {
  top: 15%;
}

/* Hearts */
.heart {
  position: absolute;
  font-size: 25px;
  animation: floatUp linear forwards;
  cursor: pointer;
}

@keyframes floatUp {
  from { transform: translateY(0); }
  to { transform: translateY(-120vh); }
}

/* Floating words */
.word {
  position: absolute;
  color: white;
  font-size: 20px;
  animation: floatUp linear forwards;
}

/* Explosion */
.loveText {
  position: absolute;
  color: white;
  font-size: 22px;
  animation: pop 1s forwards;
}

@keyframes pop {
  0% { transform: scale(0); opacity: 0; }
  50% { transform: scale(1.5); opacity: 1; }
  100% { opacity: 0; }
}
</style>

</head>

<body>

<!-- Envelope -->
<div id="envelopeScreen">
  <div class="envelope">
    <div class="flap" id="flap"></div>
    <div class="zip" id="zip">🔓</div>
    <input type="text" id="nameInput" placeholder="Type 'dear'..." />
  </div>
</div>

<!-- Main -->
<div id="mainScene">

  <div class="letterBox" id="letterBox">
    <p id="text"></p>
  </div>

  <!-- 🎵 Romantic BGM -->
  <audio id="bgMusic" loop>
    <source src="https://www.bensound.com/bensound-music/bensound-love.mp3" type="audio/mp3">
  </audio>

</div>

<script>

// 💌 Letter
let message = `My Love,

I know we had a misunderstanding, and ever since then my heart has felt heavy. I don’t like the distance between us, even if it’s just silence. You mean too much to me to let ego or small arguments create walls between us.

I’m not writing this to prove I’m right. I’m writing this because you are important to me. Your smile, your voice, the way you understand things, and even the way you get angry — everything about you matters to me. You are someone I deeply care about, respect, and value.

If I hurt you in any way, I am truly sorry. It was never my intention to make you feel sad. Sometimes words come out wrong, but my feelings for you have always been genuine and pure. I admire your strength, your kindness, and the beautiful heart you carry. You deserve patience, love, and understanding — and I promise to give you that.

Every relationship has small storms, but I believe what we share is stronger than any misunderstanding. I don’t want us to win arguments; I want us to understand each other better.

No matter what, please remember this — you are special to me.

Let’s talk, clear everything, and smile again ❤️

With all my heart,  
Yours,  
ARJUN RATHOD ❤️`;

function showLetter(){
  document.getElementById("text").innerText = message;
}

// ❤️ hearts
function createHeart(){
  let heart=document.createElement("div");
  heart.className="heart";
  heart.innerHTML="❤️";

  heart.style.left=Math.random()*100+"vw";
  heart.style.top="100%";
  heart.style.animationDuration=(Math.random()*2+4)+"s";

  document.getElementById("mainScene").appendChild(heart);

  heart.onclick=()=>{
    let t=document.createElement("div");
    t.className="loveText";
    t.innerText="I Love You ❤️";
    t.style.left=heart.style.left;
    t.style.top=heart.style.top;
    document.getElementById("mainScene").appendChild(t);
    setTimeout(()=>t.remove(),1000);
    heart.remove();
  };

  setTimeout(()=>heart.remove(),7000);
}

// 💬 words
function floatingWords(){
  let arr=["I Love You ❤️","my dear🥰"];
  let w=document.createElement("div");
  w.className="word";
  w.innerText=arr[Math.floor(Math.random()*arr.length)];

  w.style.left=Math.random()*100+"vw";
  w.style.top="100%";
  w.style.animationDuration="6s";

  document.getElementById("mainScene").appendChild(w);

  setTimeout(()=>w.remove(),6000);
}

function startHearts(){
  for(let i=0;i<30;i++) setTimeout(createHeart,i*100);

  setInterval(()=>{
    for(let i=0;i<10;i++) createHeart();
    floatingWords();
  },5000);
}

// unlock
document.getElementById("nameInput").addEventListener("input",function(){
  if(this.value.toLowerCase()==="dear"){
    document.getElementById("zip").style.display="block";
  }
});

// open
document.getElementById("zip").onclick=function(){
  document.getElementById("flap").style.transform="rotateX(180deg)";

  setTimeout(()=>{
    document.getElementById("envelopeScreen").style.display="none";
    document.getElementById("mainScene").style.display="block";

    document.getElementById("letterBox").classList.add("showLetter");
    showLetter();
    startHearts();

    // 🎵 play music on interaction (works mobile)
    document.getElementById("bgMusic").play();

  },800);
};

</script>

</body>
  </html>
