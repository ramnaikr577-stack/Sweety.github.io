<!DOCTYPE html>
<html>
<head>
<title>For You ❤️</title>

<style>
body {
  margin: 0;
  overflow: hidden;
  font-family: cursive;
}

/* 💌 Envelope screen */
#envelopeScreen {
  height: 100vh;
  display: flex;
  justify-content: center;
  align-items: center;
  background: linear-gradient(135deg, #ff4d6d, #ff99ac);
}

.envelope {
  width: 300px;
  height: 200px;
  background: #ff6b81;
  position: relative;
  border-radius: 10px;
  text-align: center;
}

.flap {
  position: absolute;
  top: 0;
  width: 100%;
  height: 100px;
  background: #ff4757;
  clip-path: polygon(0 0, 50% 100%, 100% 0);
  transition: 1s;
}

input {
  position: absolute;
  bottom: 10px;
  left: 50%;
  transform: translateX(-50%);
  padding: 6px;
  border: none;
  border-radius: 5px;
  text-align: center;
}

/* 💖 Main scene */
#mainScene {
  display: none;
  height: 100vh;
  background: radial-gradient(circle at center, #ff758c, #ff2e63);
}

/* Hearts */
.heart {
  position: absolute;
  cursor: pointer;
  animation: floatUp linear forwards;
}

@keyframes floatUp {
  0% { transform: translateY(0); opacity: 1; }
  100% { transform: translateY(-120vh); opacity: 1; }
}

/* Explosion text */
.loveText {
  position: absolute;
  color: white;
  font-size: 24px;
  font-weight: bold;
  animation: pop 1.2s ease forwards;
}

@keyframes pop {
  0% { transform: scale(0); opacity: 0; }
  50% { transform: scale(1.8); opacity: 1; }
  100% { transform: scale(1); opacity: 0; }
}

/* Center title */
.center {
  position: absolute;
  top: 50%;
  left: 50%;
  transform: translate(-50%, -50%);
  color: white;
  font-size: 30px;
}
</style>

</head>

<body>

<!-- 💌 Envelope Screen -->
<div id="envelopeScreen">
  <div class="envelope" id="env">
    <div class="flap"></div>
    <input type="text" id="nameInput" placeholder="Type your name..." />
  </div>
</div>

<!-- 💖 Main Love Scene -->
<div id="mainScene">
  <div class="center">For You ❤️</div>
</div>

<script>

// ❤️ Create heart
function createHeart(isBurst = false) {
  const heart = document.createElement("div");
  heart.className = "heart";

  const symbols = ["❤️","💖","💕","💘","💝"];
  heart.innerHTML = symbols[Math.floor(Math.random()*symbols.length)];

  heart.style.left = Math.random() * 100 + "vw";
  heart.style.top = isBurst ? "50%" : "100%";
  heart.style.fontSize = (Math.random()*20 + 25) + "px";
  heart.style.animationDuration = (Math.random()*2 + 4) + "s";

  document.getElementById("mainScene").appendChild(heart);

  heart.onclick = () => {
    explodeHeart(heart);
    heart.remove();
  };

  setTimeout(() => heart.remove(), 7000);
}

// 💥 Explosion
function explodeHeart(heart) {
  for (let i = 0; i < 8; i++) {
    const text = document.createElement("div");
    text.className = "loveText";
    text.innerText = "I Love You ❤️";

    text.style.left = heart.style.left;
    text.style.top = heart.style.top;

    document.getElementById("mainScene").appendChild(text);

    setTimeout(() => text.remove(), 1200);
  }
}

// 💥 Burst
function burstHearts() {
  for (let i = 0; i < 30; i++) {
    setTimeout(() => createHeart(true), i * 50);
  }
}

// 🔁 Continuous
function startHearts() {
  burstHearts();
  setInterval(() => {
    for (let i = 0; i < 12; i++) createHeart();
  }, 5000);
}

// ✍️ When name typed → open scene
document.getElementById("nameInput").addEventListener("input", function() {
  if (this.value.length > 2) {
    // hide envelope
    document.getElementById("envelopeScreen").style.display = "none";

    // show main scene
    document.getElementById("mainScene").style.display = "block";

    // start hearts
    startHearts();
  }
});

</script>

</body>
</html>
