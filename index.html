<!DOCTYPE html>
<html>
<head>
<title>For You ❤️</title>

<style>
body {
  margin: 0;
  height: 100vh;
  display: flex;
  justify-content: center;
  align-items: center;
  background: linear-gradient(135deg, #ff4d6d, #ff99ac);
  font-family: cursive;
  overflow: hidden;
}

/* Envelope */
.envelope {
  width: 300px;
  height: 200px;
  background: #ff6b81;
  position: relative;
  cursor: pointer;
  border-radius: 10px;
  display: flex;
  justify-content: center;
  align-items: center;
}

/* Flap */
.flap {
  position: absolute;
  top: 0;
  width: 100%;
  height: 100px;
  background: #ff4757;
  clip-path: polygon(0 0, 50% 100%, 100% 0);
  transition: 1s;
}

/* Input */
input {
  position: absolute;
  bottom: 10px;
  padding: 5px;
  border: none;
  border-radius: 5px;
  text-align: center;
}

/* Letter */
.letter {
  position: absolute;
  width: 280px;
  height: 180px;
  background: white;
  top: 10px;
  left: 10px;
  border-radius: 10px;
  padding: 15px;
  opacity: 0;
  transform: translateY(50px);
  transition: 1s;
  overflow-y: auto;
}

/* Open state */
.open .flap {
  transform: rotateX(180deg);
}

.open .letter {
  opacity: 1;
  transform: translateY(-120px);
}
</style>

</head>

<body>

<div class="envelope" id="env">
  <div class="flap"></div>

  <div class="letter" id="letter">
    <p id="text"></p>
  </div>

  <input type="text" id="nameInput" placeholder="Type your name..." />
</div>

<script>

// Love letter
let message = `Don't read this if you're still angry...

My Love,

I know we had a misunderstanding, and ever since then my heart has felt heavy. I don't like this distance between us...

Let's talk… and smile again ❤️

Yours`;

// Typing effect
function typeLetter() {
  let i = 0;
  function typing() {
    if (i < message.length) {
      document.getElementById("text").innerHTML += message.charAt(i);
      i++;
      setTimeout(typing, 30);
    }
  }
  typing();
}

// Unlock logic
document.getElementById("nameInput").addEventListener("input", function() {
  if (this.value.length > 2) {
    document.getElementById("env").classList.add("open");
    typeLetter();
  }
});
</script>

</body>
</html>
