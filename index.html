<script>
// Typing effect
let message = "let message = "Don't read this if you're still angry...\n\nMy Love,\n\nI know we had a misunderstanding, and ever since then my heart has felt heavy. I don’t like this distance between us, even if it’s just silence. You mean too much to me to let small arguments create walls between us.\n\nI’m not writing this to prove I’m right. I’m writing this because you are important to me. Your smile, your voice, the way you understand things — even the way you get angry… everything about you matters to me.\n\nIf I hurt you in any way, I am truly sorry. It was never my intention to make you feel sad. Sometimes words come out wrong, but my feelings for you have always been genuine.\n\nEvery relationship has small storms… but I believe what we have is stronger than any misunderstanding. I don’t want us to win arguments, I want us to understand each other better.\n\nNo matter what, please remember this — you are special to me. Not because you are perfect, but because you are YOU.\n\nLet’s talk… clear everything… and smile again ❤️\n\nWith all my heart,\nYours";
let i = 0;

function typeWriter() {
  if (i < message.length) {
    document.getElementById("text").innerHTML += message.charAt(i);
    i++;
    setTimeout(typeWriter, 35);
  }
}

// Start typing after slight delay
setTimeout(typeWriter, 1000);

// ❤️ Floating hearts (SMOOTHER + RANDOM)
function createHeart() {
  const heart = document.createElement("div");
  heart.classList.add("heart");
  heart.innerHTML = ["❤️","💖","💕","💘"][Math.floor(Math.random()*4)];

  heart.style.left = Math.random() * 100 + "vw";
  heart.style.fontSize = (Math.random() * 25 + 15) + "px";
  heart.style.animationDuration = (Math.random() * 3 + 3) + "s";

  document.body.appendChild(heart);

  setTimeout(() => {
    heart.remove();
  }, 6000);
}

// More hearts at start (burst effect)
for (let i = 0; i < 20; i++) {
  setTimeout(createHeart, i * 150);
}

// Continuous hearts
setInterval(createHeart, 300);

// 💫 Box entrance animation
const box = document.querySelector(".box");
box.style.transform = "scale(0.8)";
box.style.opacity = "0";

setTimeout(() => {
  box.style.transition = "all 1s ease";
  box.style.transform = "scale(1)";
  box.style.opacity = "1";
}, 200);

</script>
