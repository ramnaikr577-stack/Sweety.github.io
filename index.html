<!DOCTYPE html>
<html>
<head>
<title>For You ❤️</title>

<style>
body {
  margin: 0;
  overflow: hidden;
  font-family: cursive;
}

/* 💌 Envelope screen */
#envelopeScreen {
  height: 100vh;
  display: flex;
  justify-content: center;
  align-items: center;
  background: linear-gradient(135deg, #ff4d6d, #ff99ac);
}

.envelope {
  width: 320px;
  height: 220px;
  background: #ff6b81;
  border-radius: 12px;
  position: relative;
  text-align: center;
}

/* flap */
.flap {
  position: absolute;
  top: 0;
  width: 100%;
  height: 110px;
  background: #ff4757;
  clip-path: polygon(0 0, 50% 100%, 100% 0);
  transition: 1s;
}

/* input */
input {
  position: absolute;
  bottom: 15px;
  left: 50%;
  transform: translateX(-50%);
  padding: 6px;
  border: none;
  border-radius: 5px;
  text-align: center;
}

/* zipper */
.zip {
  position: absolute;
  top: 40%;
  left: 50%;
  transform: translateX(-50%);
  font-size: 30px;
  display: none;
  cursor: grab;
}

/* 💖 Main Scene */
#mainScene {
  display: none;
  height: 100vh;
  background: radial-gradient(circle, #ff758c, #ff2e63);
}

/* Hearts */
.heart {
  position: absolute;
  cursor: pointer;
  animation: floatUp linear forwards;
}

@keyframes floatUp {
  0% { transform: translateY(0); opacity: 1; }
  100% { transform: translateY(-120vh); opacity: 1; }
}

/* Explosion */
.loveText {
  position: absolute;
  color: white;
  font-size: 24px;
  font-weight: bold;
  animation: pop 1s forwards;
}

@keyframes pop {
  0% { transform: scale(0); opacity: 0; }
  50% { transform: scale(1.8); opacity: 1; }
  100% { transform: scale(1); opacity: 0; }
}

/* Title */
.center {
  position: absolute;
  top: 50%;
  left: 50%;
  transform: translate(-50%, -50%);
  color: white;
  font-size: 30px;
}
</style>

</head>

<body>

<!-- 💌 Envelope -->
<div id="envelopeScreen">
  <div class="envelope">
    <div class="flap" id="flap"></div>
    <div class="zip" id="zip">🔓</div>
    <input type="text" id="nameInput" placeholder="Type 'dear'..." />
  </div>
</div>

<!-- 💖 Scene -->
<div id="mainScene">
  <div class="center">For You ❤️</div>
</div>

<script>

// show zip only if "dear"
document.getElementById("nameInput").addEventListener("input", function() {
  if (this.value.toLowerCase() === "dear") {
    document.getElementById("zip").style.display = "block";
  }
});

// zip drag (simple tap/drag feel)
let zip = document.getElementById("zip");
let isDragging = false;

zip.addEventListener("mousedown", () => isDragging = true);
document.addEventListener("mouseup", () => isDragging = false);

document.addEventListener("mousemove", (e) => {
  if (isDragging) {
    zip.style.top = e.clientY + "px";

    // if dragged enough → open
    if (e.clientY > window.innerHeight / 2 + 100) {
      openEnvelope();
    }
  }
});

// mobile support
zip.addEventListener("touchstart", () => isDragging = true);
document.addEventListener("touchend", () => isDragging = false);

document.addEventListener("touchmove", (e) => {
  if (isDragging) {
    let y = e.touches[0].clientY;
    zip.style.top = y + "px";

    if (y > window.innerHeight / 2 + 100) {
      openEnvelope();
    }
  }
});

// open envelope → go to hearts
function openEnvelope() {
  document.getElementById("flap").style.transform = "rotateX(180deg)";

  setTimeout(() => {
    document.getElementById("envelopeScreen").style.display = "none";
    document.getElementById("mainScene").style.display = "block";
    startHearts();
  }, 800);
}

// ❤️ hearts
function createHeart(isBurst=false){
  let heart=document.createElement("div");
  heart.className="heart";
  heart.innerHTML=["❤️","💖","💕","💘"][Math.floor(Math.random()*4)];
  heart.style.left=Math.random()*100+"vw";
  heart.style.top=isBurst?"50%":"100%";
  heart.style.fontSize=(Math.random()*20+25)+"px";
  heart.style.animationDuration=(Math.random()*2+4)+"s";

  document.getElementById("mainScene").appendChild(heart);

  heart.onclick=()=>{
    explodeHeart(heart);
    heart.remove();
  };

  setTimeout(()=>heart.remove(),7000);
}

function explodeHeart(h){
  for(let i=0;i<6;i++){
    let t=document.createElement("div");
    t.className="loveText";
    t.innerText="I Love You ❤️";
    t.style.left=h.style.left;
    t.style.top=h.style.top;
    document.getElementById("mainScene").appendChild(t);
    setTimeout(()=>t.remove(),1000);
  }
}

function startHearts(){
  for(let i=0;i<30;i++) setTimeout(()=>createHeart(true),i*50);

  setInterval(()=>{
    for(let i=0;i<10;i++) createHeart();
  },5000);
}

</script>

</body>
</html>
